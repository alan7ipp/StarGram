<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StarGram Market</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root {
            --bg-main: #0a0a0a;
            --bg-card: #1c1c1e;
            --bg-card-hover: #242426;
            --border-color: #2c2c2e;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --accent-gold: #f5c542;
            --accent-blue: #4dabf7;
            --accent-green: #34c759;
            --accent-green-bg: rgba(52, 199, 89, 0.15);
            --accent-gold-bg: rgba(245, 197, 66, 0.15);
            --accent-blue-bg: rgba(77, 171, 247, 0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-main); color: var(--text-main); padding: 16px; padding-bottom: 80px; overflow-x: hidden; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; margin-bottom: 20px; position: sticky; top: 0; background: var(--bg-main); z-index: 10; border-bottom: 1px solid var(--border-color); }
        .logo { display: flex; align-items: center; gap: 6px; color: var(--accent-gold); font-weight: 700; font-size: 16px; }
        .badges-container { display: flex; gap: 8px; align-items: center; }
        .balance-badge { background: var(--accent-green-bg); border: 1px solid rgba(52, 199, 89, 0.3); border-radius: 20px; padding: 6px 12px; font-size: 13px; font-weight: 600; color: var(--accent-green); cursor: pointer; display: flex; align-items: center; gap: 4px; transition: transform 0.1s; }
        .balance-badge:active { transform: scale(0.95); }
        .admin-badge { background: var(--accent-gold-bg); border: 1px solid rgba(245, 197, 66, 0.3); color: var(--accent-gold); border-radius: 20px; padding: 6px 12px; font-size: 13px; font-weight: 600; cursor: pointer; display: none; align-items: center; gap: 4px; transition: transform 0.1s; }
        .admin-badge:active { transform: scale(0.95); }
        .tabs-wrapper { margin-bottom: 20px; padding-bottom: 4px; }
        .tabs { display: flex; gap: 10px; }
        .tab { flex: 1; text-align: center; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: all 0.2s; display: flex; justify-content: center; align-items: center; gap: 6px; }
        .tab.active { background: var(--accent-gold-bg); color: var(--accent-gold); border-color: var(--accent-gold); }
        .tab-premium.active { background: var(--accent-blue-bg); color: var(--accent-blue); border-color: var(--accent-blue); }
        .section { display: none; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .section-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; color: var(--accent-gold); display: flex; align-items: center; gap: 6px; }
        .section-title.premium { color: var(--accent-blue); }
        .card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 14px; padding: 12px 16px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: all 0.15s; }
        .card:hover { background: var(--bg-card-hover); }
        .card:active { transform: scale(0.98); }

        /* Звёзды — золотое свечение, 58px */
        .card-icon-star {
            width: 58px; height: 58px;
            object-fit: contain; flex-shrink: 0;
            filter: drop-shadow(0 0 8px rgba(245, 197, 66, 0.6)) drop-shadow(0 0 18px rgba(245, 197, 66, 0.3));
            transition: filter 0.3s;
        }
        .card:hover .card-icon-star {
            filter: drop-shadow(0 0 14px rgba(245, 197, 66, 0.9)) drop-shadow(0 0 28px rgba(245, 197, 66, 0.5));
        }
        .card-star:hover { border-color: rgba(245, 197, 66, 0.5); }

        /* Premium — синее свечение, 58px */
        .card-icon-premium {
            width: 58px; height: 58px;
            object-fit: contain; flex-shrink: 0;
            filter: drop-shadow(0 0 8px rgba(77, 171, 247, 0.6)) drop-shadow(0 0 18px rgba(77, 171, 247, 0.3));
            transition: filter 0.3s;
        }
        .card:hover .card-icon-premium {
            filter: drop-shadow(0 0 14px rgba(77, 171, 247, 0.9)) drop-shadow(0 0 28px rgba(77, 171, 247, 0.5));
        }
        .card-premium:hover { border-color: rgba(77, 171, 247, 0.5); }

        .card-left { display: flex; align-items: center; gap: 14px; }
        .card-info h3 { font-size: 16px; font-weight: 600; color: var(--text-main); }
        .card-price { font-size: 15px; font-weight: 700; color: var(--accent-green); }
        .custom-input { display: flex; gap: 8px; margin-top: 16px; }
        .input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-main); font-size: 15px; outline: none; transition: border-color 0.2s; }
        .input:focus { border-color: var(--accent-gold); }
        .custom-input input { flex: 1; }
        .custom-input button { background: linear-gradient(135deg, #f5c542, #e5a400); color: #000; border: none; padding: 0 20px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .btn { background: linear-gradient(135deg, #f5c542, #e5a400); color: #000; border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 700; width: 100%; cursor: pointer; margin-top: 12px; transition: transform 0.1s; }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { background: #333; color: #777; cursor: not-allowed; transform: none; }
        .btn-outline { background: transparent; border: 1px solid var(--accent-gold); color: var(--accent-gold); padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 700; width: 100%; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        .btn-outline:active { background: var(--accent-gold-bg); }
        .btn-small { background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-muted); padding: 10px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 8px; width: 100%; transition: all 0.2s; }
        .btn-small:hover { color: var(--text-main); border-color: #555; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; animation: fadeIn 0.2s; }
        .modal-content { background: var(--bg-main); border: 1px solid var(--border-color); border-radius: 20px; padding: 24px; width: 100%; max-width: 380px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .modal-content h3 { margin-bottom: 16px; color: var(--text-main); font-size: 20px; text-align: center; }
        .recipient-found { display: none; align-items: center; gap: 14px; padding: 14px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; margin-top: 12px; }
        .recipient-found.show { display: flex; animation: fadeIn 0.2s; }
        .recipient-found img { width: 46px; height: 46px; border-radius: 50%; object-fit: cover; background: #333; }
        .recipient-found .info .name { font-size: 15px; font-weight: bold; }
        .recipient-found .info .sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
        .error-text { color: #ff453a; font-size: 13px; margin-top: 8px; display: none; text-align: center; }
        .error-text.show { display: block; }
        #ton-connect-container { display: flex; justify-content: center; margin: 16px 0; }
        @keyframes confetti-fall { 0% { transform: translateY(-50px) rotate(0); opacity: 1; } 100% { transform: translateY(800px) rotate(720deg); opacity: 0; } }
        .confetti-piece { position: fixed; font-size: 28px; animation: confetti-fall 2.5s ease-out forwards; pointer-events: none; z-index: 200; top: -50px; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">⭐ StarGram</div>
    <div class="badges-container">
        <div class="balance-badge" id="balanceDisplay" onclick="openDeposit()">🪙 0.00 GRAM</div>
        <div class="admin-badge" id="adminBadge" onclick="openAdmin()">👑 Админ</div>
    </div>
</div>

<div class="tabs-wrapper">
    <div class="tabs">
        <div class="tab active" data-tab="stars">⭐ Звёзды</div>
        <div class="tab tab-premium" data-tab="premium">👑 Premium</div>
    </div>
</div>

<div class="section active" id="tab-stars">
    <div class="section-title">💎 Telegram Stars</div>
    <div id="stars-list">Загрузка...</div>
    <div class="custom-input">
        <input type="number" id="customStarsQty" class="input" placeholder="Своё количество" min="50" max="100000000">
        <button onclick="buyCustomStars()">Купить</button>
    </div>
</div>

<div class="section" id="tab-premium">
    <div class="section-title premium">👑 Telegram Premium</div>
    <div id="premium-list">Загрузка...</div>
</div>

<div class="modal" id="modalBuy">
    <div class="modal-content">
        <h3 id="modalTitle">Покупка</h3>
        <p style="text-align:center;color:var(--accent-green);font-weight:bold;font-size:16px;margin-bottom:16px;" id="modalPrice"></p>
        <input class="input" type="text" id="recipientInput" placeholder="Username получателя (@username)" oninput="searchUser()">
        <button class="btn-small" onclick="fillMyUsername()">📩 Отправить себе</button>
        <div class="recipient-found" id="recipientFound">
            <img id="recipientAvatar" src="" alt="avatar">
            <div class="info">
                <div class="name" id="recipientName"></div>
                <div class="sub">Получатель</div>
            </div>
        </div>
        <div class="error-text" id="errorText">⚠️ Пользователь не найден в Telegram</div>
        <div class="error-text" id="insufficientText" style="display:none;"></div>
        <button class="btn" id="btnBuy" onclick="confirmBuy()" disabled>Купить сейчас</button>
        <button class="btn-outline" id="btnDepositNeeded" onclick="openDeposit()" style="display:none;">💰 Пополнить баланс</button>
        <button class="btn-outline" onclick="closeModal('modalBuy')">Отмена</button>
    </div>
</div>

<div class="modal" id="modalDeposit">
    <div class="modal-content">
        <h3>🪙 Пополнение баланса</h3>
        <p style="color:var(--text-muted);text-align:center;font-size:14px;margin-bottom:16px;">Введите сумму в GRAM (минимум 0.1)</p>
        <input class="input" type="number" id="depositAmount" placeholder="Например: 10" min="0.1" step="0.1">
        <p style="color:var(--text-main);font-size:14px;margin:16px 0 8px 0;text-align:center;font-weight:600;">Привяжите кошелёк:</p>
        <div id="ton-connect-container"></div>
        <button class="btn" onclick="deposit()">🪙 Пополнить</button>
        <button class="btn-outline" onclick="closeModal('modalDeposit')">Отмена</button>
    </div>
</div>

<div class="modal" id="modalSuccess">
    <div class="modal-content" style="text-align:center;">
        <div style="font-size:48px;margin-bottom:10px;">✅</div>
        <h3 id="successTitle" style="color:var(--accent-green);">Готово!</h3>
        <p id="successText" style="white-space:pre-line;color:var(--text-muted);font-size:15px;line-height:1.5;margin-bottom:20px;"></p>
        <button class="btn" onclick="closeModal('modalSuccess')">Отлично</button>
    </div>
</div>

<div class="modal" id="modalAdmin">
    <div class="modal-content">
        <h3>👑 Админ-панель</h3>
        <input class="input" type="number" id="adminUserId" placeholder="ID пользователя" style="margin-bottom:10px;">
        <input class="input" type="text" id="adminAmount" placeholder="Сумма / Часы бана" style="margin-bottom:10px;">
        <input class="input" type="text" id="adminReason" placeholder="Причина бана" style="margin-bottom:10px;">
        <button class="btn" onclick="adminAction('userinfo')">👤 Информация</button>
        <button class="btn" onclick="adminAction('give')" style="background:linear-gradient(135deg,#34c759,#28a745);">💰 Выдать GRAM</button>
        <button class="btn" onclick="adminAction('take')" style="background:linear-gradient(135deg,#ff453a,#dc3545);">💸 Списать GRAM</button>
        <button class="btn" onclick="adminAction('ban')" style="background:#333;color:#fff;">🚫 Забанить</button>
        <button class="btn" onclick="adminAction('unban')" style="background:transparent;border:1px solid #444;color:#fff;">✅ Разбанить</button>
        <button class="btn-outline" onclick="closeModal('modalAdmin')">Закрыть</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp; tg.expand();
    const API = "https://stargram-0c8j.onrender.com/api";
    const USER_ID = tg.initDataUnsafe?.user?.id || 0;
    const WALLET = "UQBoaCWXtSkgoygDPUns7vHUZFOuwDRzdZ5upaGXsavWzHc9";
    const ADMIN_IDS = [5312114620, 8310460385];
    const IS_ADMIN = ADMIN_IDS.includes(USER_ID);
    if (IS_ADMIN) document.getElementById('adminBadge').style.display = 'flex';

    let currentItem = null, tonPrice = 3.5, userBalance = 0, searchTimeout = null, userFound = false;

    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({ manifestUrl: 'https://alan7ipp.github.io/StarGram/tonconnect-manifest.json', buttonRootId: 'ton-connect-container' });

    const PRICES_USDT = {
        stars: { 50:0.75, 100:1.50, 250:3.75, 500:7.50, 750:11.25, 1000:15.00, 2500:37.50, 5000:75.00, 10000:150.00, 50000:750.00, 100000:1500.00, 1000000:15000.00 },
        premium: { 3:11.99, 6:15.99, 12:28.99 }
    };

    function usdtToGram(u) { return (u / tonPrice * 1.02).toFixed(2); }

    // Картинки правильно: звезда для звёзд, premium для premium
    const URL_STAR = 'https://i.ibb.co/MkDD7dKc/Screenshot-20260619-165338-Google-2.png';
    const URL_PREMIUM = 'https://i.ibb.co/bg3Z1nMb/1781880361490-1-1.png';

    function getStarIcon() { return `<img src="${URL_STAR}" class="card-icon-star" alt="star">`; }
    function getPremiumIcon() { return `<img src="${URL_PREMIUM}" class="card-icon-premium" alt="premium">`; }

    async function loadPrices() {
        try { const r = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=the-open-network&vs_currencies=usd'); tonPrice = (await r.json())['the-open-network'].usd; } catch(e) {}
        let h = '';
        for (const [m, u] of Object.entries(PRICES_USDT.premium)) {
            const g = usdtToGram(u), l = m == 3 ? '3 месяца' : m == 6 ? '6 месяцев' : '12 месяцев';
            h += `<div class="card card-premium" onclick="openBuy('premium','Premium на ${l}',${g},${m})"><div class="card-left">${getPremiumIcon()}<div class="card-info"><h3>Premium на ${l}</h3></div></div><span class="card-price">${g} GRAM</span></div>`;
        }
        document.getElementById('premium-list').innerHTML = h; h = '';
        [50,100,250,500,750,1000,2500,5000,10000,50000,100000,1000000].forEach(q => {
            const g = usdtToGram(PRICES_USDT.stars[q]);
            h += `<div class="card card-star" onclick="openBuy('stars','${q.toLocaleString()} звёзд',${g},${q})"><div class="card-left">${getStarIcon()}<div class="card-info"><h3>${q.toLocaleString()} звёзд</h3></div></div><span class="card-price">${g} GRAM</span></div>`;
        });
        document.getElementById('stars-list').innerHTML = h;
    }

    async function loadBalance() { try { const r = await fetch(API + '/balance/' + USER_ID); userBalance = (await r.json()).balance; updateDisplay(); } catch(e) {} }
    loadPrices(); loadBalance();

    document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', function() {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active', 'tab-premium'));
        this.classList.add('active');
        if (this.dataset.tab === 'premium') this.classList.add('tab-premium');
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('tab-' + this.dataset.tab).classList.add('active');
    }));

    async function searchUser() {
        const v = document.getElementById('recipientInput').value.trim();
        const fb = document.getElementById('recipientFound'), av = document.getElementById('recipientAvatar');
        const nm = document.getElementById('recipientName'), et = document.getElementById('errorText'), bb = document.getElementById('btnBuy');
        if (searchTimeout) clearTimeout(searchTimeout);
        if (v.length < 2) { fb.classList.remove('show'); et.classList.remove('show'); bb.disabled = true; userFound = false; return; }
        const u = v.startsWith('@') ? v.substring(1) : v;
        searchTimeout = setTimeout(async () => {
            try {
                const r = await fetch(API + '/telegram/user/' + u); const d = await r.json();
                if (d.error) { fb.classList.remove('show'); et.classList.add('show'); bb.disabled = true; userFound = false; }
                else {
                    nm.textContent = d.name || u;
                    av.src = d.photo || ('data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="46" height="46"><rect fill="%23333" width="46" height="46" rx="23"/><text fill="%23888" x="23" y="31" text-anchor="middle" font-size="20">' + (u[0]||'?').toUpperCase() + '</text></svg>'));
                    fb.classList.add('show'); et.classList.remove('show'); bb.disabled = false; userFound = true;
                }
            } catch(e) { fb.classList.remove('show'); et.classList.remove('show'); bb.disabled = true; userFound = false; }
        }, 500);
    }

    function fillMyUsername() { const u = tg.initDataUnsafe?.user?.username; if (u) { document.getElementById('recipientInput').value = '@' + u; searchUser(); } else tg.showAlert('Нет username!'); }
    function openBuy(t, n, p, q) {
        currentItem = { type: t, name: n, price: p, quantity: q };
        document.getElementById('modalTitle').textContent = n;
        document.getElementById('modalPrice').innerHTML = `${p} GRAM<br><span style="font-size:13px;color:#8e8e93;font-weight:normal;">Доступно: ${userBalance.toFixed(2)} GRAM</span>`;
        document.getElementById('recipientInput').value = ''; document.getElementById('recipientFound').classList.remove('show'); document.getElementById('errorText').classList.remove('show');
        document.getElementById('btnBuy').disabled = true; document.getElementById('insufficientText').style.display = 'none'; document.getElementById('btnDepositNeeded').style.display = 'none'; document.getElementById('btnBuy').style.display = 'block';
        userFound = false;
        const pn = parseFloat(p);
        if (userBalance < pn) { document.getElementById('insufficientText').textContent = '⚠️ Не хватает ' + (pn - userBalance).toFixed(2) + ' GRAM'; document.getElementById('insufficientText').style.display = 'block'; document.getElementById('btnDepositNeeded').style.display = 'block'; document.getElementById('btnBuy').style.display = 'none'; }
        document.getElementById('modalBuy').classList.add('active'); setTimeout(() => document.getElementById('recipientInput').focus(), 300);
    }

    function buyCustomStars() { const q = parseInt(document.getElementById('customStarsQty').value); if (!q || q < 50) return tg.showAlert('Минимум 50!'); if (q > 100000000) return tg.showAlert('Максимум 100M!'); openBuy('stars', q.toLocaleString() + ' звёзд', usdtToGram(q * 0.015), q); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    async function confirmBuy() {
        if (!userFound) return tg.showAlert('Найдите получателя!');
        const r = document.getElementById('recipientInput').value.trim(); if (!r || !currentItem) return;
        const p = parseFloat(currentItem.price);
        if (userBalance >= p) {
            const resp = await fetch(API + '/order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ tg_id:USER_ID, type:currentItem.type, name:currentItem.name, price:currentItem.price, quantity:currentItem.quantity, recipient:r, paid_from_balance:true }) });
            const d = await resp.json();
            if (d.status === 'ok') { userBalance -= p; updateDisplay(); closeModal('modalBuy'); showStarsConfetti(); showSuccess('✅ Покупка совершена!', '🛍 ' + currentItem.name + '\n📩 ' + r + '\n💰 -' + p.toFixed(2) + ' GRAM'); }
        } else openDeposit();
    }

    function openDeposit() { document.getElementById('depositAmount').value = ''; document.getElementById('modalDeposit').classList.add('active'); }
    async function deposit() {
        const a = parseFloat(document.getElementById('depositAmount').value); if (!a || a < 0.1) return tg.showAlert('Минимум 0.1 GRAM!');
        if (!tonConnectUI.wallet) return tg.showAlert('Привяжите кошелёк!');
        try {
            const r = await tonConnectUI.sendTransaction({ validUntil: Math.floor(Date.now()/1000)+300, messages:[{ address: WALLET, amount: Math.floor(a*1e9).toString() }] });
            if (r && r.boc) { await fetch(API + '/deposit/confirm', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ tg_id:USER_ID, amount:a, tx_hash:r.boc }) }); userBalance += a; updateDisplay(); closeModal('modalDeposit'); showStarsConfetti(); showSuccess('✅ Пополнено!', '💰 +' + a + ' GRAM'); }
        } catch(e) { tg.showAlert('Платёж отменён или ошибка.'); }
    }

    function showStarsConfetti() { const s = ['⭐','⭐','⭐','⭐','⭐','🌟','✨','💫']; for (let i=0;i<35;i++) setTimeout(()=>{ const p=document.createElement('div'); p.className='confetti-piece'; p.textContent=s[Math.floor(Math.random()*s.length)]; p.style.left=Math.random()*100+'%'; p.style.animationDuration=(1.5+Math.random()*2)+'s'; p.style.fontSize=(20+Math.random()*20)+'px'; document.body.appendChild(p); setTimeout(()=>p.remove(),3500); },i*30); }
    function showSuccess(t, tx) { document.getElementById('successTitle').textContent = t; document.getElementById('successText').textContent = tx; document.getElementById('modalSuccess').classList.add('active'); }
    function updateDisplay() { document.getElementById('balanceDisplay').textContent = '🪙 ' + userBalance.toFixed(2) + ' GRAM'; }

    function openAdmin() { if(!IS_ADMIN)return; document.getElementById('adminUserId').value=''; document.getElementById('adminAmount').value=''; document.getElementById('adminReason').value=''; document.getElementById('modalAdmin').classList.add('active'); }
    async function adminAction(act) {
        const uid = parseInt(document.getElementById('adminUserId').value); if (!uid) return tg.showAlert('Введите ID!');
        try {
            const r = await fetch(API + '/admin/' + act, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ admin_id:USER_ID, user_id:uid, amount:document.getElementById('adminAmount').value, reason:document.getElementById('adminReason').value, hours:act==='ban'?parseFloat(document.getElementById('adminAmount').value):0 }) });
            const d = await r.json();
            if (d.status === 'ok') { closeModal('modalAdmin'); tg.showAlert('✅ Готово!'); } else tg.showAlert('Ошибка');
        } catch(e) { tg.showAlert('Ошибка связи'); }
    }

    updateDisplay();
</script>
</body>
</html>
