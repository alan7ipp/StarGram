<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StarGram Market</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root {
            --bg-main: #0a0a0a;
            --bg-card: #1c1c1e;
            --bg-card-hover: #242426;
            --border-color: #2c2c2e;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --accent-gold: #f5c542;
            --accent-green: #34c759;
            --accent-green-bg: rgba(52, 199, 89, 0.15);
            --accent-gold-bg: rgba(245, 197, 66, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-main);
            color: var(--text-main);
            padding: 16px;
            padding-bottom: 80px;
            overflow-x: hidden;
        }

        /* --- Header & Top Bar --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            background: var(--bg-main);
            z-index: 10;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--accent-gold);
            font-weight: 700;
            font-size: 16px;
        }

        .badges-container {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .balance-badge {
            background: var(--accent-green-bg);
            border: 1px solid rgba(52, 199, 89, 0.3);
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent-green);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: transform 0.1s;
        }
        .balance-badge:active { transform: scale(0.95); }

        .admin-badge {
            background: var(--accent-gold-bg);
            border: 1px solid rgba(245, 197, 66, 0.3);
            color: var(--accent-gold);
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: transform 0.1s;
        }
        .admin-badge:active { transform: scale(0.95); }

        /* --- Tabs --- */
        .tabs-wrapper {
            margin-bottom: 20px;
            padding-bottom: 4px;
        }
        .tabs {
            display: flex;
            gap: 10px;
        }
        .tab {
            flex: 1;
            text-align: center;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }
        .tab.active {
            background: var(--accent-gold-bg);
            color: var(--accent-gold);
            border-color: var(--accent-gold);
        }

        /* --- Sections & Cards --- */
        .section {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .section.active { display: block; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 14px;
            color: var(--accent-gold);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 12px 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.15s;
        }
        .card:hover {
            background: var(--bg-card-hover);
            border-color: rgba(245, 197, 66, 0.4);
        }
        .card:active {
            transform: scale(0.98);
        }

        .card-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        
        .card-icon-svg {
            width: 42px;
            height: 42px;
            flex-shrink: 0;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.4));
        }

        .card-info h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
        }

        .card-price {
            font-size: 15px;
            font-weight: 700;
            color: var(--accent-green);
        }

        /* --- Inputs & Buttons --- */
        .custom-input {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }
        .input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input:focus { border-color: var(--accent-gold); }
        
        .custom-input input { flex: 1; }
        .custom-input button {
            background: linear-gradient(135deg, #f5c542, #e5a400);
            color: #000;
            border: none;
            padding: 0 20px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn {
            background: linear-gradient(135deg, #f5c542, #e5a400);
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            margin-top: 12px;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.97); }
        .btn:disabled {
            background: #333;
            color: #777;
            cursor: not-allowed;
            transform: none;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .btn-outline:active { background: var(--accent-gold-bg); }

        .btn-small {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            width: 100%;
            transition: all 0.2s;
        }
        .btn-small:hover {
            color: var(--text-main);
            border-color: #555;
        }

        /* --- Modals --- */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.active { display: flex; animation: fadeIn 0.2s; }
        
        .modal-content {
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 380px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .modal-content h3 {
            margin-bottom: 16px;
            color: var(--text-main);
            font-size: 20px;
            text-align: center;
        }

        .recipient-found {
            display: none;
            align-items: center;
            gap: 14px;
            padding: 14px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-top: 12px;
        }
        .recipient-found.show { display: flex; animation: fadeIn 0.2s; }
        
        .recipient-found img {
            width: 46px; height: 46px;
            border-radius: 50%;
            object-fit: cover;
            background: #333;
        }
        .recipient-found .info .name { font-size: 15px; font-weight: bold; }
        .recipient-found .info .sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

        .error-text { color: #ff453a; font-size: 13px; margin-top: 8px; display: none; text-align: center; }
        .error-text.show { display: block; }
        
        #ton-connect-container {
            display: flex;
            justify-content: center;
            margin: 16px 0;
        }

        /* --- Confetti Animation --- */
        @keyframes confetti-fall {
            0% { transform: translateY(-50px) rotate(0); opacity: 1; }
            100% { transform: translateY(800px) rotate(720deg); opacity: 0; }
        }
        .confetti-piece {
            position: fixed;
            font-size: 28px;
            animation: confetti-fall 2.5s ease-out forwards;
            pointer-events: none;
            z-index: 200;
            top: -50px;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">
        <svg width="20" height="20" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 3.5L25.3 14.3H35.85C36.65 14.3 37.15 15.1 36.8 15.8L27.8 22.8L31.1 32.7C31.35 33.45 30.75 34.2 29.95 34.2L20 27.1L10.85 33.9C10.2 34.4 9.25 34.2 8.75 33.5L11.9 22.8L3.4 16.4C2.75 15.9 2.65 14.95 3.15 14.35H14.4L18.25 4.25C18.5 3.65 19.2 3.3 19.8 3.5Z" fill="#f5c542"/>
        </svg>
        StarGram
    </div>
    <div class="badges-container">
        <div class="balance-badge" id="balanceDisplay" onclick="openDeposit()">
            <span>🪙</span> 0.00 GRAM
        </div>
        <div class="admin-badge" id="adminBadge" style="display:none;" onclick="openAdmin()">
            <span>👑</span> Админ
        </div>
    </div>
</div>

<div class="tabs-wrapper">
    <div class="tabs">
        <div class="tab active" data-tab="stars">
            <svg width="18" height="18" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 3.5L25.3 14.3H35.85L27.8 22.8L31.1 32.7L20 27.1L10.85 33.9L11.9 22.8L3.4 16.4H14.4L18.25 4.25Z" fill="currentColor"/>
            </svg>
            Звёзды
        </div>
        <div class="tab" data-tab="premium">
            <svg width="18" height="18" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M6 31L8 13L16 21L20 7L24 21L32 13L34 31H6Z" fill="currentColor"/>
                <path d="M6 33C6 34.1 6.9 35 8 35H32C33.1 35 34 34.1 34 33V31H6V33Z" fill="currentColor"/>
            </svg>
            Premium
        </div>
    </div>
</div>

<div class="section active" id="tab-stars">
    <div class="section-title">
        <svg width="18" height="18" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 2L3 14L20 28L37 14L20 2Z" fill="#4dabf7"/>
            <path d="M3 14L20 40L37 14L20 28L3 14Z" fill="#228be6"/>
        </svg>
        Telegram Stars (от 50 до 100 000 000)
    </div>
    <div id="stars-list">Загрузка...</div>
    <div class="custom-input">
        <input type="number" id="customStarsQty" class="input" placeholder="Своё количество" min="50" max="100000000">
        <button onclick="buyCustomStars()">Купить</button>
    </div>
</div>

<div class="section" id="tab-premium">
    <div class="section-title">
        <svg width="18" height="18" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 31L8 13L16 21L20 7L24 21L32 13L34 31H6Z" fill="#f5c542"/>
        </svg>
        Telegram Premium
    </div>
    <div id="premium-list">Загрузка...</div>
</div>

<div class="modal" id="modalBuy">
    <div class="modal-content">
        <h3 id="modalTitle">Покупка</h3>
        <p style="text-align: center; color: var(--accent-green); font-weight: bold; font-size: 16px; margin-bottom: 16px;" id="modalPrice"></p>
        
        <input class="input" type="text" id="recipientInput" placeholder="Username получателя (@username)" oninput="searchUser()">
        <button class="btn-small" onclick="fillMyUsername()">📩 Вставить мой username</button>
        
        <div class="recipient-found" id="recipientFound">
            <img id="recipientAvatar" src="" alt="avatar">
            <div class="info">
                <div class="name" id="recipientName"></div>
                <div class="sub">Получатель</div>
            </div>
        </div>
        
        <div class="error-text" id="errorText">⚠️ Пользователь не найден в Telegram</div>
        <div class="error-text" id="insufficientText" style="display:none; color: #ff9f0a; font-weight: bold;"></div>
        
        <button class="btn" id="btnBuy" onclick="confirmBuy()" disabled style="margin-top: 20px;">Купить сейчас</button>
        <button class="btn-outline" id="btnDepositNeeded" onclick="openDeposit()" style="display:none; border-color: var(--accent-green); color: var(--accent-green);">🪙 Пополнить баланс</button>
        <button class="btn-outline" onclick="closeModal('modalBuy')" style="border-color: #555; color: #aaa;">Отмена</button>
    </div>
</div>

<div class="modal" id="modalDeposit">
    <div class="modal-content">
        <h3>🪙 Пополнение баланса</h3>
        <p style="color: var(--text-muted); text-align: center; font-size: 14px; margin-bottom: 16px;">Введите сумму в GRAM (минимум 0.1)</p>
        
        <input class="input" type="number" id="depositAmount" placeholder="Например: 10" min="0.1" step="0.1">
        
        <p style="color: var(--text-main); font-size: 14px; margin: 16px 0 8px 0; text-align: center; font-weight: 600;">Привяжите кошелёк:</p>
        <div id="ton-connect-container"></div>
        
        <button class="btn" onclick="deposit()">🪙 Пополнить</button>
        <button class="btn-outline" onclick="closeModal('modalDeposit')" style="border-color: #555; color: #aaa;">Отмена</button>
    </div>
</div>

<div class="modal" id="modalSuccess">
    <div class="modal-content" style="text-align:center;">
        <div style="font-size: 48px; margin-bottom: 10px;">✅</div>
        <h3 id="successTitle" style="color: var(--accent-green);">Готово!</h3>
        <p id="successText" style="white-space: pre-line; color: var(--text-muted); font-size: 15px; line-height: 1.5; margin-bottom: 20px;"></p>
        <button class="btn" onclick="closeModal('modalSuccess')">Отлично</button>
    </div>
</div>

<div class="modal" id="modalAdmin">
    <div class="modal-content">
        <h3>👑 Админ-панель</h3>
        <input class="input" type="number" id="adminUserId" placeholder="ID пользователя" style="margin-bottom: 10px;">
        <input class="input" type="text" id="adminAmount" placeholder="Сумма / Часы бана" style="margin-bottom: 10px;">
        <input class="input" type="text" id="adminReason" placeholder="Причина бана" style="margin-bottom: 10px;">
        
        <button class="btn" onclick="adminAction('userinfo')" style="margin-top: 5px;">👤 Информация</button>
        <button class="btn" onclick="adminAction('give')" style="margin-top: 5px; background: linear-gradient(135deg, #34c759, #28a745);">💰 Выдать GRAM</button>
        <button class="btn" onclick="adminAction('take')" style="margin-top: 5px; background: linear-gradient(135deg, #ff453a, #dc3545);">💸 Списать GRAM</button>
        <button class="btn" onclick="adminAction('ban')" style="margin-top: 5px; background: #333; color: #fff;">🚫 Забанить</button>
        <button class="btn" onclick="adminAction('unban')" style="margin-top: 5px; background: transparent; border: 1px solid #444; color: #fff;">✅ Разбанить</button>
        <button class="btn-outline" onclick="closeModal('modalAdmin')" style="border-color: #555; color: #aaa;">Закрыть</button>
    </div>
</div>

<script>
    // === ВЕКТОРНЫЕ ИКОНКИ БЕЗ ЭМОДЗИ ===
    
    // Золотая Звезда (3D эффект, градиенты, блики)
    function getStarSVG() {
        return `<svg class="card-icon-svg" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g filter="url(#star_shadow)">
                <path d="M20 3.5C20.65 3.5 21.2 3.9 21.45 4.5L25.3 14.3H35.85C36.65 14.3 37.15 15.1 36.8 15.8C36.7 16 36.5 16.2 36.3 16.4L27.8 22.8L31.1 32.7C31.35 33.45 30.75 34.2 29.95 34.2C29.65 34.2 29.4 34.1 29.15 33.9L20 27.1L10.85 33.9C10.2 34.4 9.25 34.2 8.75 33.5C8.6 33.25 8.5 33 8.6 32.7L11.9 22.8L3.4 16.4C2.75 15.9 2.65 14.95 3.15 14.35C3.3 14.15 3.55 14.05 3.85 14.05H14.4L18.25 4.25C18.5 3.65 19.2 3.3 19.8 3.5C19.9 3.5 20 3.5 20 3.5Z" fill="url(#star_grad1)"/>
                <path d="M20 6.5L23.8 16.3H32.8L25.5 21.6L28.2 30.5L20 24.5L11.8 30.5L14.5 21.6L7.2 16.3H16.2L20 6.5Z" fill="url(#star_grad2)"/>
            </g>
            <defs>
                <linearGradient id="star_grad1" x1="20" y1="3.5" x2="20" y2="34.2" gradientUnits="userSpaceOnUse">
                    <stop stop-color="#FFD600"/>
                    <stop offset="1" stop-color="#FF8A00"/>
                </linearGradient>
                <linearGradient id="star_grad2" x1="20" y1="6.5" x2="20" y2="30.5" gradientUnits="userSpaceOnUse">
                    <stop stop-color="#FFE866"/>
                    <stop offset="1" stop-color="#FFB300"/>
                </linearGradient>
                <filter id="star_shadow" x="-5" y="-5" width="50" height="50" filterUnits="userSpaceOnUse">
                    <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.5"/>
                </filter>
            </defs>
        </svg>`;
    }

    // Золотая Корона (Premium, камни, 3D эффект)
    function getPremiumSVG() {
        return `<svg class="card-icon-svg" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g filter="url(#crown_shadow)">
                <path d="M5 32L8 12L16 20L20 6L24 20L32 12L35 32H5Z" fill="url(#crown_grad1)"/>
                <path d="M5 34C5 35.1 5.9 36 7 36H33C34.1 36 35 35.1 35 34V32H5V34Z" fill="url(#crown_grad2)"/>
                <circle cx="8" cy="10" r="2.5" fill="#FFE866"/>
                <circle cx="20" cy="4" r="3" fill="#FFE866"/>
                <circle cx="32" cy="10" r="2.5" fill="#FFE866"/>
                <path d="M10 30L11 16L16 21.5L20 10.5L24 21.5L29 16L30 30H10Z" fill="url(#crown_grad_hl)"/>
            </g>
            <defs>
                <linearGradient id="crown_grad1" x1="20" y1="6" x2="20" y2="32" gradientUnits="userSpaceOnUse">
                    <stop stop-color="#FFD600"/>
                    <stop offset="1" stop-color="#FF8A00"/>
                </linearGradient>
                <linearGradient id="crown_grad2" x1="20" y1="32" x2="20" y2="36" gradientUnits="userSpaceOnUse">
                    <stop stop-color="#FFB300"/>
                    <stop offset="1" stop-color="#E67A00"/>
                </linearGradient>
                <linearGradient id="crown_grad_hl" x1="20" y1="10" x2="20" y2="30" gradientUnits="userSpaceOnUse">
                    <stop stop-color="#FFF2A8" stop-opacity="0.8"/>
                    <stop offset="1" stop-color="#FFD600" stop-opacity="0.0"/>
                </linearGradient>
                <filter id="crown_shadow" x="-5" y="-5" width="50" height="50" filterUnits="userSpaceOnUse">
                    <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.5"/>
                </filter>
            </defs>
        </svg>`;
    }

    // === ОСНОВНЫЕ ПЕРЕМЕННЫЕ ===
    const tg = window.Telegram.WebApp;
    tg.expand();

    const API = "https://stargram-0c8j.onrender.com/api";
    const USER_ID = tg.initDataUnsafe?.user?.id || 0;
    const WALLET = "UQBoaCWXtSkgoygDPUns7vHUZFOuwDRzdZ5upaGXsavWzHc9";
    const ADMIN_IDS = [5312114620, 8310460385];
    const IS_ADMIN = ADMIN_IDS.includes(USER_ID);

    if (IS_ADMIN) {
        document.getElementById('adminBadge').style.display = 'flex';
    }

    let currentItem = null;
    let tonPrice = 3.5;
    let userBalance = 0;
    let searchTimeout = null;
    let userFound = false;

    // === TON CONNECT ===
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://alan7ipp.github.io/StarGram/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-container'
    });

    // === ЦЕНЫ ===
    const PRICES_USDT = {
        stars: {
            50: 0.75, 100: 1.50, 250: 3.75, 500: 7.50, 750: 11.25, 
            1000: 15.00, 2500: 37.50, 5000: 75.00, 10000: 150.00, 
            50000: 750.00, 100000: 1500.00, 1000000: 15000.00
        },
        premium: {
            3: 11.99, 6: 15.99, 12: 28.99
        }
    };

    function usdtToGram(usdt) {
        return (usdt / tonPrice * 1.02).toFixed(2);
    }

    // === ЗАГРУЗКА ЦЕН ===
    async function loadPrices() {
        try {
            const resp = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=the-open-network&vs_currencies=usd');
            const data = await resp.json();
            tonPrice = data['the-open-network'].usd;
        } catch(e) {}

        // Premium список
        let premiumHTML = '';
        for (const [months, usdt] of Object.entries(PRICES_USDT.premium)) {
            const gram = usdtToGram(usdt);
            let label = months == 3 ? '3 месяца' : months == 6 ? '6 месяцев' : '12 месяцев';

            premiumHTML += `
                <div class="card" onclick="openBuy('premium', 'Premium на ${label}', ${gram}, ${months})">
                    <div class="card-left">
                        ${getPremiumSVG()}
                        <div class="card-info"><h3>${label}</h3></div>
                    </div>
                    <span class="card-price">${gram} GRAM</span>
                </div>`;
        }
        document.getElementById('premium-list').innerHTML = premiumHTML;

        // Stars список
        let starsHTML = '';
        const starQtys = [50, 100, 250, 500, 750, 1000, 2500, 5000, 10000, 50000, 100000, 1000000];
        starQtys.forEach(qty => {
            const gram = usdtToGram(PRICES_USDT.stars[qty]);
            const formattedQty = qty.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
            starsHTML += `
                <div class="card" onclick="openBuy('stars', '${formattedQty} звёзд', ${gram}, ${qty})">
                    <div class="card-left">
                        ${getStarSVG()}
                        <div class="card-info"><h3>${formattedQty} звёзд</h3></div>
                    </div>
                    <span class="card-price">${gram} GRAM</span>
                </div>`;
        });
        document.getElementById('stars-list').innerHTML = starsHTML;
    }

    // === ЗАГРУЗКА БАЛАНСА ===
    async function loadBalance() {
        try {
            const resp = await fetch(API + '/balance/' + USER_ID);
            const data = await resp.json();
            userBalance = data.balance || 0;
            updateDisplay();
        } catch(e) {}
    }

    loadPrices();
    loadBalance();

    // === ТАБЫ ===
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('tab-' + this.dataset.tab).classList.add('active');
        });
    });

    // === ПОИСК ПОЛУЧАТЕЛЯ ===
    async function searchUser() {
        const input = document.getElementById('recipientInput').value.trim();
        const foundBox = document.getElementById('recipientFound');
        const avatar = document.getElementById('recipientAvatar');
        const nameEl = document.getElementById('recipientName');
        const errorText = document.getElementById('errorText');
        const buyBtn = document.getElementById('btnBuy');

        if (searchTimeout) clearTimeout(searchTimeout);

        if (input.length < 2) {
            foundBox.classList.remove('show');
            errorText.classList.remove('show');
            buyBtn.disabled = true;
            userFound = false;
            return;
        }

        const username = input.startsWith('@') ? input.substring(1) : input;

        searchTimeout = setTimeout(async () => {
            try {
                const resp = await fetch(API + '/telegram/user/' + username);
                const data = await resp.json();

                if (data.error) {
                    foundBox.classList.remove('show');
                    errorText.classList.add('show');
                    buyBtn.disabled = true;
                    userFound = false;
                } else {
                    nameEl.textContent = data.name || username;
                    const avatarPlaceholder = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48"><rect fill="%232c2c2e" width="48" height="48" rx="24"/><text fill="%238e8e93" x="24" y="32" text-anchor="middle" font-size="22" font-family="sans-serif">' + (username[0] || '?').toUpperCase() + '</text></svg>');
                    
                    if (data.photo) {
                        avatar.src = data.photo;
                        avatar.onerror = () => avatar.src = avatarPlaceholder;
                    } else {
                        avatar.src = avatarPlaceholder;
                    }
                    
                    foundBox.classList.add('show');
                    errorText.classList.remove('show');
                    buyBtn.disabled = false;
                    userFound = true;
                }
            } catch(e) {
                foundBox.classList.remove('show');
                errorText.classList.remove('show');
                buyBtn.disabled = true;
                userFound = false;
            }
        }, 500);
    }

    function fillMyUsername() {
        const myUsername = tg.initDataUnsafe?.user?.username;
        if (myUsername) {
            document.getElementById('recipientInput').value = '@' + myUsername;
            searchUser();
        } else {
            tg.showAlert('У вас нет username в Telegram!');
        }
    }

    // === ОТКРЫТЬ ПОКУПКУ ===
    function openBuy(type, name, price, quantity) {
        currentItem = { type: type, name: name, price: price, quantity: quantity };

        document.getElementById('modalTitle').textContent = name;
        document.getElementById('modalPrice').innerHTML = `${price} GRAM <br><span style="font-size:13px; color:#8e8e93; font-weight:normal;">Доступно: ${userBalance.toFixed(2)} GRAM</span>`;
        
        document.getElementById('recipientInput').value = '';
        document.getElementById('recipientFound').classList.remove('show');
        document.getElementById('errorText').classList.remove('show');
        document.getElementById('btnBuy').disabled = true;
        document.getElementById('insufficientText').style.display = 'none';
        document.getElementById('btnDepositNeeded').style.display = 'none';
        document.getElementById('btnBuy').style.display = 'block';
        userFound = false;

        const priceNum = parseFloat(price);
        if (userBalance < priceNum) {
            const needed = (priceNum - userBalance).toFixed(2);
            document.getElementById('insufficientText').textContent = '⚠️ Не хватает ' + needed + ' GRAM';
            document.getElementById('insufficientText').style.display = 'block';
            document.getElementById('btnDepositNeeded').style.display = 'block';
            document.getElementById('btnBuy').style.display = 'none';
        }

        document.getElementById('modalBuy').classList.add('active');
        setTimeout(() => document.getElementById('recipientInput').focus(), 300);
    }

    function buyCustomStars() {
        const qty = parseInt(document.getElementById('customStarsQty').value);
        if (!qty || qty < 50) return tg.showAlert('Минимум 50 звёзд!');
        if (qty > 100000000) return tg.showAlert('Максимум 100 000 000 звёзд!');
        
        const usdt = qty * 0.015;
        const formattedQty = qty.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
        openBuy('stars', formattedQty + ' звёзд', usdtToGram(usdt), qty);
    }

    function closeModal(id) {
        document.getElementById(id).classList.remove('active');
    }

    // === ПОДТВЕРДИТЬ ПОКУПКУ ===
    async function confirmBuy() {
        if (!userFound) return tg.showAlert('Сначала найдите получателя!');
        const recipient = document.getElementById('recipientInput').value.trim();
        if (!recipient) return tg.showAlert('Введите username получателя!');
        if (!currentItem) return;

        const price = parseFloat(currentItem.price);
        if (userBalance >= price) {
            const resp = await fetch(API + '/order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    tg_id: USER_ID, type: currentItem.type,
                    name: currentItem.name, price: currentItem.price,
                    quantity: currentItem.quantity, recipient: recipient,
                    paid_from_balance: true
                })
            });
            const result = await resp.json();

            if (result.status === 'ok') {
                userBalance -= price;
                updateDisplay();
                closeModal('modalBuy');
                showConfetti();
                showSuccess('Успешно!', 'Покупка: ' + currentItem.name + '\nПолучатель: ' + recipient + '\n\nСписано: ' + price.toFixed(2) + ' GRAM');
            }
        } else {
            openDeposit();
        }
    }

    // === ПОПОЛНЕНИЕ ===
    function openDeposit() {
        document.getElementById('depositAmount').value = '';
        document.getElementById('modalDeposit').classList.add('active');
    }

    async function deposit() {
        const amount = parseFloat(document.getElementById('depositAmount').value);
        if (!amount || amount < 0.1) return tg.showAlert('Минимум 0.1 GRAM!');

        const wallet = tonConnectUI.wallet;
        if (!wallet) return tg.showAlert('Сначала привяжите кошелёк (кнопка выше)!');

        const nanoAmount = Math.floor(amount * 1_000_000_000);

        try {
            const result = await tonConnectUI.sendTransaction({
                validUntil: Math.floor(Date.now() / 1000) + 300,
                messages: [{ address: WALLET, amount: nanoAmount.toString() }]
            });

            if (result && result.boc) {
                await fetch(API + '/deposit/confirm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tg_id: USER_ID, amount: amount, tx_hash: result.boc })
                });

                userBalance += amount;
                updateDisplay();
                closeModal('modalDeposit');
                showConfetti();
                showSuccess('Баланс пополнен!', '+' + amount + ' GRAM\nНовый баланс: ' + userBalance.toFixed(2) + ' GRAM');
            }
        } catch(e) {
            tg.showAlert('Платёж отменён или произошла ошибка.');
        }
    }

    // === АНИМАЦИЯ ===
    function showConfetti() {
        const emojis = ['🌟', '✨', '💎', '🚀', '🪙'];
        for (let i = 0; i < 30; i++) {
            setTimeout(() => {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                piece.style.left = (Math.random() * 100) + '%';
                piece.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
                document.body.appendChild(piece);
                setTimeout(() => piece.remove(), 3000);
            }, i * 40);
        }
    }

    function showSuccess(title, text) {
        document.getElementById('successTitle').textContent = title;
        document.getElementById('successText').textContent = text;
        document.getElementById('modalSuccess').classList.add('active');
    }

    function updateDisplay() {
        document.getElementById('balanceDisplay').innerHTML = '<span>🪙</span> ' + userBalance.toFixed(2) + ' GRAM';
    }

    // === АДМИН-ПАНЕЛЬ ===
    function openAdmin() {
        if (!IS_ADMIN) return;
        document.getElementById('adminUserId').value = '';
        document.getElementById('adminAmount').value = '';
        document.getElementById('adminReason').value = '';
        document.getElementById('modalAdmin').classList.add('active');
    }

    async function adminAction(action) {
        const uid = parseInt(document.getElementById('adminUserId').value);
        if (!uid) return tg.showAlert('Введите ID пользователя!');
        
        try {
            const resp = await fetch(API + '/admin/' + action, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    admin_id: USER_ID, user_id: uid,
                    amount: document.getElementById('adminAmount').value,
                    reason: document.getElementById('adminReason').value,
                    hours: action === 'ban' ? parseFloat(document.getElementById('adminAmount').value) : 0
                })
            });
            const data = await resp.json();
            if (data.status === 'ok') {
                closeModal('modalAdmin');
                tg.showAlert('✅ Команда выполнена!');
            } else {
                tg.showAlert('Ошибка / не найдено');
            }
        } catch(e) {
            tg.showAlert('Ошибка связи с сервером');
        }
    }

    updateDisplay();
</script>
</body>
</html>
