<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarGram Market</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #fff;
            padding: 16px;
        }
        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid #222;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 24px; color: #f5c542; }
        .header p { color: #888; font-size: 14px; margin-top: 4px; }
        .section { margin-bottom: 20px; }
        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #f5c542;
        }
        .card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: 0.2s;
        }
        .card:hover { background: #222; border-color: #f5c542; }
        .card-left { display: flex; align-items: center; gap: 12px; }
        .card-icon { font-size: 32px; }
        .card-info h3 { font-size: 16px; }
        .card-info p { font-size: 12px; color: #888; }
        .card-price { font-size: 16px; font-weight: bold; color: #4caf50; }
        .btn {
            background: #f5c542;
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:disabled { background: #444; color: #888; cursor: not-allowed; }
        .input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #fff;
            font-size: 14px;
            margin-top: 8px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 16px;
            padding: 20px;
            width: 90%;
            max-width: 380px;
        }
        .modal-content h3 { margin-bottom: 12px; color: #f5c542; }
        .modal-content p { color: #aaa; font-size: 14px; margin-bottom: 6px; }
        .recipient-box {
            display: none;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #222;
            border-radius: 12px;
            margin-top: 10px;
        }
        .recipient-box.show { display: flex; }
        .recipient-box img {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #333;
            object-fit: cover;
        }
        .recipient-box .info .name { font-size: 15px; font-weight: bold; color: #fff; }
        .recipient-box .info .sub { font-size: 12px; color: #888; }
        .recipient-box .status { margin-left: auto; font-size: 18px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>⭐ StarGram Market</h1>
        <p>Звёзды, Premium, подарки — без верификации</p>
    </div>

    <div class="section">
        <div class="section-title">💎 Telegram Stars</div>
        <div id="stars-list">Загрузка...</div>
    </div>

    <div class="section">
        <div class="section-title">👑 Telegram Premium</div>
        <div id="premium-list">Загрузка...</div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Покупка</h3>
            <p id="modalDesc"></p>
            <input class="input" type="text" id="recipientInput" placeholder="Username получателя (с @ или без)" oninput="searchRecipient()">
            <div class="recipient-box" id="recipientBox">
                <img id="recipientAvatar" src="" alt="avatar">
                <div class="info">
                    <div class="name" id="recipientName"></div>
                    <div class="sub">Получатель</div>
                </div>
                <span class="status" id="recipientStatus"></span>
            </div>
            <button class="btn" id="buyBtn" onclick="confirmBuy()">Подтвердить покупку</button>
            <button class="btn" style="background:#444;color:#fff;margin-top:6px" onclick="closeModal()">Отмена</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentItem = null;
        let foundRecipient = null;
        let tonPrice = 3.5;

        const PRICES_USDT = {
            stars: { 50: 0.75, 100: 1.50, 500: 7.50, 1000: 15.00 },
            premium: { 1: 11.99, 6: 15.99, 12: 28.99 }
        };

        function usdtToGram(usdt) {
            return (usdt / tonPrice * 1.02).toFixed(2);
        }

        async function loadPrices() {
            try {
                const resp = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=the-open-network&vs_currencies=usd');
                const data = await resp.json();
                tonPrice = data['the-open-network'].usd;
            } catch(e) {
                tonPrice = 3.5;
            }

            let premiumHTML = '';
            for (const [months, usdt] of Object.entries(PRICES_USDT.premium)) {
                const gram = usdtToGram(usdt);
                premiumHTML += `<div class="card" onclick="openBuy('premium', 'Premium ${months} мес.', ${gram}, ${months})"><div class="card-left"><span class="card-icon">👑</span><div class="card-info"><h3>Premium ${months} месяц(ев)</h3></div></div><span class="card-price">${gram} GRAM</span></div>`;
            }
            document.getElementById('premium-list').innerHTML = premiumHTML;

            let starsHTML = '';
            for (const [qty, usdt] of Object.entries(PRICES_USDT.stars)) {
                const gram = usdtToGram(usdt);
                starsHTML += `<div class="card" onclick="openBuy('stars', '${qty} звёзд', ${gram}, ${qty})"><div class="card-left"><span class="card-icon">⭐</span><div class="card-info"><h3>${qty} звёзд</h3></div></div><span class="card-price">${gram} GRAM</span></div>`;
            }
            document.getElementById('stars-list').innerHTML = starsHTML;
        }

        loadPrices();

        function searchRecipient() {
            const input = document.getElementById('recipientInput').value.trim();
            const box = document.getElementById('recipientBox');
            const avatar = document.getElementById('recipientAvatar');
            const name = document.getElementById('recipientName');
            const status = document.getElementById('recipientStatus');

            if (input.length < 2) {
                box.classList.remove('show');
                foundRecipient = null;
                return;
            }

            const username = input.startsWith('@') ? input.substring(1) : input;
            foundRecipient = { name: username, recipient: username };
            name.textContent = username;
            status.textContent = '';
            avatar.src = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44"><rect fill="%23333" width="44" height="44" rx="22"/><text fill="%23888" x="22" y="28" text-anchor="middle" font-size="20" font-family="sans-serif">' + (username[0] || '?').toUpperCase() + '</text></svg>');
            box.classList.add('show');
        }

        function openBuy(type, name, price, quantity) {
            currentItem = { type, name, price, quantity };
            document.getElementById('modalTitle').textContent = '🛒 ' + name;
            document.getElementById('modalDesc').textContent = 'Цена: ' + price + ' GRAM';
            document.getElementById('recipientInput').value = '';
            document.getElementById('recipientBox').classList.remove('show');
            foundRecipient = null;
            document.getElementById('modal').classList.add('active');
            setTimeout(function() { document.getElementById('recipientInput').focus(); }, 300);
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            currentItem = null;
            foundRecipient = null;
        }

        function confirmBuy() {
            const recipient = document.getElementById('recipientInput').value.trim();
            if (!recipient) {
                tg.showAlert('Введите username получателя!');
                return;
            }
            if (!currentItem) return;
            tg.sendData(JSON.stringify({ type: currentItem.type, name: currentItem.name, price: currentItem.price, quantity: currentItem.quantity, recipient: recipient }));
            tg.close();
        }
    </script>
</body>
</html>
