<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarGram Market</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #fff;
            padding: 16px;
        }
        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid #222;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 24px; color: #f5c542; }
        .header p { color: #888; font-size: 14px; margin-top: 4px; }
        .section { margin-bottom: 20px; }
        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #f5c542;
        }
        .card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: 0.2s;
        }
        .card:hover { background: #222; border-color: #f5c542; }
        .card-left { display: flex; align-items: center; gap: 12px; }
        .card-icon { font-size: 32px; }
        .card-info h3 { font-size: 16px; }
        .card-info p { font-size: 12px; color: #888; }
        .card-price {
            font-size: 16px;
            font-weight: bold;
            color: #4caf50;
        }
        .btn {
            background: #f5c542;
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:disabled { background: #444; color: #888; cursor: not-allowed; }
        .input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #fff;
            font-size: 14px;
            margin-top: 8px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 16px;
            padding: 20px;
            width: 90%;
            max-width: 360px;
        }
        .modal-content h3 { margin-bottom: 12px; color: #f5c542; }
        .modal-content p { color: #aaa; font-size: 14px; margin-bottom: 6px; }
        .loading { text-align: center; color: #888; padding: 40px; }
        .recipient-preview {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #222;
            border-radius: 10px;
            margin-top: 10px;
        }
        .recipient-preview.show { display: flex; }
        .recipient-preview img {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: #333;
        }
        .recipient-preview .name { font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <h1>⭐ StarGram Market</h1>
        <p>Звёзды, Premium, подарки — без верификации</p>
    </div>

    <div class="section">
        <div class="section-title">💎 Telegram Stars</div>
        <div id="stars-list" class="loading">Загрузка цен...</div>
    </div>

    <div class="section">
        <div class="section-title">👑 Telegram Premium</div>
        <div id="premium-list" class="loading">Загрузка цен...</div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Покупка</h3>
            <p id="modalDesc"></p>
            <input class="input" type="text" id="recipientInput" placeholder="Username получателя (с @ или без)" oninput="searchRecipient()">
            <div class="recipient-preview" id="recipientPreview">
                <img id="recipientAvatar" src="" alt="">
                <span class="name" id="recipientName"></span>
            </div>
            <button class="btn" id="buyBtn" onclick="confirmBuy()">Подтвердить покупку</button>
            <button class="btn" style="background:#444;color:#fff;margin-top:6px" onclick="closeModal()">Отмена</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentItem = null;
        let foundRecipient = null;
        const API_KEY = 'nyIluP49rLSVOIt7xIy4EksysIIOiyYOlKuHSuqzuoE=';

        // Загрузка цен
        async function loadPrices() {
            try {
                const resp = await fetch('https://v1.fragmentapi.com/api/v1/partner/premium/packages', {
                    headers: { 'API-Key': API_KEY }
                });
                const packages = await resp.json();

                let premiumHTML = '';
                packages.forEach(pkg => {
                    const price = (pkg.ton_value * 1.02).toFixed(1);
                    premiumHTML += `
                        <div class="card" onclick="openBuy('premium', 'Premium ${pkg.months} мес.', ${price}, ${pkg.months})">
                            <div class="card-left">
                                <span class="card-icon">👑</span>
                                <div class="card-info"><h3>Premium ${pkg.months} месяца</h3></div>
                            </div>
                            <span class="card-price">${price} GRAM</span>
                        </div>`;
                });
                document.getElementById('premium-list').innerHTML = premiumHTML;

                const starPrices = [
                    { qty: 50, base: 0.625 },
                    { qty: 100, base: 1.25 },
                    { qty: 500, base: 6.25 },
                    { qty: 1000, base: 12.5 }
                ];
                let starsHTML = '';
                starPrices.forEach(s => {
                    const price = (s.base * 1.02).toFixed(2);
                    starsHTML += `
                        <div class="card" onclick="openBuy('stars', '${s.qty} звёзд', ${price}, ${s.qty})">
                            <div class="card-left">
                                <span class="card-icon">⭐</span>
                                <div class="card-info"><h3>${s.qty} звёзд</h3></div>
                            </div>
                            <span class="card-price">${price} GRAM</span>
                        </div>`;
                });
                document.getElementById('stars-list').innerHTML = starsHTML;

            } catch (e) {
                document.getElementById('stars-list').innerHTML = 'Ошибка загрузки цен';
                document.getElementById('premium-list').innerHTML = 'Ошибка загрузки цен';
            }
        }

        loadPrices();

        // Поиск получателя
        async function searchRecipient() {
            const input = document.getElementById('recipientInput').value.trim();
            const preview = document.getElementById('recipientPreview');
            const avatar = document.getElementById('recipientAvatar');
            const name = document.getElementById('recipientName');
            
            if (input.length < 2) {
                preview.classList.remove('show');
                foundRecipient = null;
                return;
            }

            const username = input.startsWith('@') ? input.substring(1) : input;

            try {
                const resp = await fetch(`https://v1.fragmentapi.com/api/v1/partner/premium/recipient/search?username=${username}&months=3`, {
                    headers: { 'API-Key': API_KEY }
                });
                const data = await resp.json();

                if (data.success && !data.myself) {
                    foundRecipient = data;
                    name.textContent = data.name || username;
                    if (data.photo) {
                        avatar.src = data.photo;
                    } else {
                        avatar.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40"><rect fill="%23333" width="40" height="40"/><text fill="%23888" x="50%25" y="55%25" text-anchor="middle" font-size="20">?</text></svg>';
                    }
                    preview.classList.add('show');
                } else {
                    preview.classList.remove('show');
                    foundRecipient = null;
                }
            } catch (e) {
                preview.classList.remove('show');
                foundRecipient = null;
            }
        }

        function openBuy(type, name, price, quantity) {
            currentItem = { type, name, price, quantity };
            document.getElementById('modalTitle').textContent = '🛒 ' + name;
            document.getElementById('modalDesc').textContent = 'Цена: ' + price + ' GRAM';
            document.getElementById('recipientInput').value = '';
            document.getElementById('recipientPreview').classList.remove('show');
            foundRecipient = null;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            currentItem = null;
            foundRecipient = null;
        }

        function confirmBuy() {
            const recipient = document.getElementById('recipientInput').value.trim();
            if (!recipient) {
                alert('Введите username получателя!');
                return;
            }
            if (!currentItem) return;

            const data = {
                type: currentItem.type,
                name: currentItem.name,
                price: currentItem.price,
                quantity: currentItem.quantity,
                recipient: recipient
            };

            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
