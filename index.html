<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarGram Market</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #fff; padding: 16px; padding-bottom: 80px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; margin-bottom: 16px; }
        .balance-badge { background: #1a1a1a; border: 1px solid #333; border-radius: 20px; padding: 8px 14px; font-size: 14px; font-weight: bold; color: #4caf50; cursor: pointer; }
        .header { text-align: center; padding: 10px 0 20px 0; border-bottom: 1px solid #222; margin-bottom: 16px; }
        .header h1 { font-size: 22px; color: #f5c542; }
        .tabs { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; }
        .tab { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 20px; padding: 10px 18px; font-size: 14px; font-weight: bold; cursor: pointer; white-space: nowrap; color: #aaa; }
        .tab.active { background: #f5c542; color: #000; }
        .section { margin-bottom: 20px; display: none; }
        .section.active { display: block; }
        .section-title { font-size: 18px; font-weight: bold; margin-bottom: 12px; color: #f5c542; }
        .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 14px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .card:hover { background: #222; border-color: #f5c542; }
        .card-left { display: flex; align-items: center; gap: 10px; }
        .card-icon { font-size: 28px; }
        .card-info h3 { font-size: 15px; }
        .card-price { font-size: 15px; font-weight: bold; color: #4caf50; }
        .custom-input { display: flex; gap: 8px; margin-top: 10px; }
        .custom-input input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 14px; }
        .custom-input button { background: #f5c542; color: #000; border: none; padding: 12px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn { background: #f5c542; color: #000; border: none; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-outline { background: transparent; border: 1px solid #f5c542; color: #f5c542; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 14px; margin-top: 8px; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: #1a1a1a; border: 1px solid #333; border-radius: 16px; padding: 20px; width: 90%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
        .modal-content h3 { margin-bottom: 12px; color: #f5c542; }
        .recipient-box { display: none; align-items: center; gap: 12px; padding: 12px; background: #222; border-radius: 12px; margin-top: 10px; }
        .recipient-box.show { display: flex; }
        .recipient-box img { width: 48px; height: 48px; border-radius: 50%; background: #333; object-fit: cover; }
        .recipient-box .info .name { font-size: 15px; font-weight: bold; color: #fff; }
        .error-text { color: #ff4444; font-size: 13px; margin-top: 8px; display: none; }
        .error-text.show { display: block; }
        #ton-connect-container { display: flex; justify-content: center; margin: 10px 0; }
        .admin-badge { background: #f5c542; color: #000; border-radius: 12px; padding: 4px 10px; font-size: 12px; font-weight: bold; margin-left: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="top-bar">
        <span style="color:#f5c542;font-weight:bold;">⭐ StarGram</span>
        <span class="balance-badge" id="balanceDisplay" onclick="openDeposit()">🪙 0 GRAM</span>
        <span class="admin-badge" id="adminBadge" style="display:none;" onclick="openAdmin()">👑 Админ</span>
    </div>
    <div class="tabs">
        <div class="tab active" data-tab="stars">⭐ Звёзды</div>
        <div class="tab" data-tab="premium">👑 Premium</div>
    </div>
    <div class="section active" id="tab-stars">
        <div class="section-title">💎 Telegram Stars (от 50 до 100 000 000)</div>
        <div id="stars-list">Загрузка...</div>
        <div class="custom-input">
            <input type="number" id="customStarsQty" placeholder="Своё количество (50-100M)" min="50" max="100000000">
            <button onclick="buyCustomStars()">Купить</button>
        </div>
    </div>
    <div class="section" id="tab-premium">
        <div class="section-title">👑 Telegram Premium</div>
        <div id="premium-list">Загрузка...</div>
    </div>

    <div class="modal" id="modalBuy"><div class="modal-content"><h3 id="modalTitle">Покупка</h3><p style="color:#4caf50;" id="modalPrice"></p><input class="input" id="recipientInput" placeholder="Username (@username)" oninput="searchRecipient()"><button class="btn-outline" style="margin-top:4px;padding:8px;font-size:12px;" onclick="fillMyUsername()">📩 Отправить себе</button><div class="recipient-box" id="recipientBox"><img id="recipientAvatar"><div class="info"><div class="name" id="recipientName"></div></div></div><div class="error-text" id="errorText">⚠️ Пользователь не найден</div><div class="error-text" id="insufficientText" style="display:none;"></div><button class="btn" id="btnBuy" onclick="confirmBuy()">Купить сейчас</button><button class="btn-outline" id="btnDepositNeeded" onclick="openDeposit()" style="display:none;">💰 Пополнить</button><button class="btn-outline" onclick="closeModal('modalBuy')">Отмена</button></div></div>
    <div class="modal" id="modalDeposit"><div class="modal-content"><h3>🪙 Пополнение</h3><input class="input" id="depositAmount" placeholder="Минимум 0.1 GRAM" min="0.1" step="0.1"><p style="color:#888;font-size:12px;margin-top:4px;">От 0.1 GRAM</p><div id="ton-connect-container"></div><button class="btn" onclick="deposit()">🪙 Пополнить</button><button class="btn-outline" onclick="closeModal('modalDeposit')">Отмена</button></div></div>
    <div class="modal" id="modalSuccess"><div class="modal-content" style="text-align:center;"><h3 id="successTitle">✅</h3><p id="successText"></p><button class="btn" onclick="closeModal('modalSuccess')">ОК</button></div></div>
    <div class="modal" id="modalAdmin"><div class="modal-content"><h3>👑 Админ</h3><input class="input" id="adminUserId" placeholder="ID пользователя"><input class="input" id="adminAmount" placeholder="Сумма/часы"><input class="input" id="adminReason" placeholder="Причина"><button class="btn" onclick="adminAction('userinfo')">👤 Инфо</button><button class="btn" onclick="adminAction('give')">💰 Выдать</button><button class="btn" onclick="adminAction('take')">💸 Списать</button><button class="btn" onclick="adminAction('ban')">🚫 Бан</button><button class="btn" onclick="adminAction('unban')">✅ Разбан</button><button class="btn-outline" onclick="closeModal('modalAdmin')">Закрыть</button></div></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let currentItem, foundRecipient, tonPrice=3.5, userBalance=0, searchTimeout;
        const WALLET_ADDRESS="UQBoaCWXtSkgoygDPUns7vHUZFOuwDRzdZ5upaGXsavWzHc9";
        const ADMIN_IDS=[5312114620,8310460385];
        const USER_ID=tg.initDataUnsafe?.user?.id||0;
        const IS_ADMIN=ADMIN_IDS.includes(USER_ID);
        if(IS_ADMIN) document.getElementById('adminBadge').style.display='inline-block';

        const tonConnectUI=new TON_CONNECT_UI.TonConnectUI({manifestUrl:'https://alan7ipp.github.io/StarGram/tonconnect-manifest.json',buttonRootId:'ton-connect-container'});
        const PRICES_USDT={stars:{50:0.75,100:1.5,250:3.75,500:7.5,750:11.25,1000:15,2500:37.5,5000:75,10000:150,50000:750,100000:1500,1000000:15000},premium:{3:11.99,6:15.99,12:28.99}};
        function usdtToGram(u){return(u/tonPrice*1.02).toFixed(2)}
        async function loadPrices(){try{tonPrice=(await(await fetch('https://api.coingecko.com/api/v3/simple/price?ids=the-open-network&vs_currencies=usd')).json())['the-open-network'].usd}catch(e){};let h='';for(let[m,u]of Object.entries(PRICES_USDT.premium)){let g=usdtToGram(u),l=m==3?'3 месяца':m==6?'6 месяцев':'12 месяцев';h+=`<div class="card" onclick="openBuy('premium','Premium на ${l}',${g},${m})"><div class="card-left"><span class="card-icon">👑</span><div class="card-info"><h3>Premium на ${l}</h3></div></div><span class="card-price">${g} GRAM</span></div>`}document.getElementById('premium-list').innerHTML=h;h='';[50,100,250,500,750,1000,2500,5000,10000,50000,100000,1000000].forEach(q=>{let g=usdtToGram(PRICES_USDT.stars[q]);h+=`<div class="card" onclick="openBuy('stars','${q.toLocaleString()} звёзд',${g},${q})"><div class="card-left"><span class="card-icon">⭐</span><div class="card-info"><h3>${q.toLocaleString()} звёзд</h3></div></div><span class="card-price">${g} GRAM</span></div>`});document.getElementById('stars-list').innerHTML=h}
        loadPrices();
        document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',function(){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));this.classList.add('active');document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById('tab-'+this.dataset.tab).classList.add('active')}));
        function searchRecipient(){let v=document.getElementById('recipientInput').value.trim();if(searchTimeout)clearTimeout(searchTimeout);if(v.length<2){document.getElementById('recipientBox').classList.remove('show');document.getElementById('errorText').classList.remove('show');return}let u=v.startsWith('@')?v.substring(1):v;searchTimeout=setTimeout(async()=>{try{let r=await fetch('https://t.me/'+u),h=await r.text(),m=h.match(/<meta property="og:description" content="([^"]+)"/);foundRecipient={name:u,recipient:u};document.getElementById('recipientName').textContent=u;document.getElementById('recipientAvatar').src='data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48"><rect fill="%23333" width="48" height="48" rx="24"/><text fill="%23888" x="24" y="30" text-anchor="middle" font-size="22">'+(u[0]||'?').toUpperCase()+'</text></svg>');document.getElementById('recipientBox').classList.add('show');if(m&&!m[1].includes("Telegram: Contact"))document.getElementById('errorText').classList.remove('show');else document.getElementById('errorText').classList.add('show')}catch(e){foundRecipient={name:u,recipient:u};document.getElementById('recipientName').textContent=u;document.getElementById('recipientAvatar').src='data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48"><rect fill="%23333" width="48" height="48" rx="24"/><text fill="%23888" x="24" y="30" text-anchor="middle" font-size="22">'+(u[0]||'?').toUpperCase()+'</text></svg>');document.getElementById('recipientBox').classList.add('show');document.getElementById('errorText').classList.remove('show')}},500)}
        function fillMyUsername(){if(tg.initDataUnsafe?.user?.username)document.getElementById('recipientInput').value='@'+tg.initDataUnsafe.user.username;else document.getElementById('recipientInput').value='';searchRecipient()}
        function openBuy(t,n,p,q){currentItem={type:t,name:n,price:p,quantity:q};document.getElementById('modalTitle').textContent='🛒 '+n;document.getElementById('modalPrice').textContent='Цена: '+p+' GRAM | Баланс: '+userBalance.toFixed(1)+' GRAM';document.getElementById('recipientInput').value='';document.getElementById('recipientBox').classList.remove('show');document.getElementById('errorText').classList.remove('show');document.getElementById('insufficientText').style.display='none';document.getElementById('btnDepositNeeded').style.display='none';document.getElementById('btnBuy').style.display='block';if(userBalance<parseFloat(p)){document.getElementById('insufficientText').textContent='⚠️ Не хватает '+(parseFloat(p)-userBalance).toFixed(1)+' GRAM';document.getElementById('insufficientText').style.display='block';document.getElementById('btnDepositNeeded').style.display='block'}document.getElementById('modalBuy').classList.add('active');setTimeout(()=>document.getElementById('recipientInput').focus(),300)}
        function buyCustomStars(){let q=parseInt(document.getElementById('customStarsQty').value);if(!q||q<50){tg.showAlert('Минимум 50!');return}if(q>1e8){tg.showAlert('Максимум 100М!');return}openBuy('stars',q.toLocaleString()+' звёзд',usdtToGram(q*0.015),q)}
        function closeModal(id){document.getElementById(id).classList.remove('active')}
        function confirmBuy(){let r=document.getElementById('recipientInput').value.trim();if(!r){tg.showAlert('Введите username!');return}if(!currentItem)return;let p=parseFloat(currentItem.price);if(userBalance>=p){userBalance-=p;updateBalanceDisplay();tg.sendData(JSON.stringify({action:'order',type:currentItem.type,name:currentItem.name,price:currentItem.price,quantity:currentItem.quantity,recipient:r,paid_from_balance:true}));closeModal('modalBuy');showSuccess('✅ Готово!','🛍 '+currentItem.name+'\n📩 '+r+'\n💰 -'+p+' GRAM')}else openDeposit()}
        function openDeposit(){document.getElementById('depositAmount').value='';document.getElementById('modalDeposit').classList.add('active')}
        async function deposit(){let a=parseFloat(document.getElementById('depositAmount').value);if(!a||a<0.1){tg.showAlert('Минимум 0.1 GRAM!');return}if(!tonConnectUI.wallet){tg.showAlert('Привяжите кошелёк!');return}try{await tonConnectUI.sendTransaction({validUntil:Math.floor(Date.now()/1000)+300,messages:[{address:WALLET_ADDRESS,amount:Math.floor(a*1e9).toString()}]});userBalance+=a;updateBalanceDisplay();tg.sendData(JSON.stringify({action:'deposit',amount:a}));closeModal('modalDeposit');showSuccess('✅ Пополнено!','💰 +'+a+' GRAM\nБаланс: '+userBalance.toFixed(1)+' GRAM')}catch(e){if(e.message&&e.message.includes('declined'))tg.showAlert('Платёж отменён.');else tg.showAlert('Ошибка.')}}
        function showSuccess(t,tx){document.getElementById('successTitle').textContent=t;document.getElementById('successText').textContent=tx;document.getElementById('modalSuccess').classList.add('active')}
        function updateBalanceDisplay(){document.getElementById('balanceDisplay').textContent='🪙 '+userBalance.toFixed(1)+' GRAM'}
        function openAdmin(){document.getElementById('modalAdmin').classList.add('active')}
        function adminAction(act){let uid=parseInt(document.getElementById('adminUserId').value);let amt=document.getElementById('adminAmount').value;let rsn=document.getElementById('adminReason').value;tg.sendData(JSON.stringify({action:'admin_'+act,user_id:uid,amount:amt,reason:rsn,hours:act==='ban'?parseFloat(amt):0}));closeModal('modalAdmin')}
        updateBalanceDisplay();
    </script>
</body>
</html>
